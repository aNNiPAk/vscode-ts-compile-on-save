name: Apply Patch and Build on Windows

on:
  workflow_dispatch: # Запуск вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Включаем поддержку длинных путей в Git ДО любых clone/checkout
      - name: Enable long paths in Git
        run: |
          git config --global core.longpaths true
          git config --global --get core.longpaths

      # Шаг 1: Клонируем ваш репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Клонируем оригинальный VSCode репозиторий (с указанным коммитом)
      - name: Clone original VSCode repository
        run: |
          git -c core.longpaths=true clone --depth=1 --branch=main https://github.com/microsoft/vscode.git vscode-source

      # Шаг 3: Кэширование зависимостей Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: vscode-source/.nvmrc
          cache: npm
          cache-dependency-path: |
            vscode-source/package-lock.json
            vscode-source/build/package-lock.json
            vscode-source/extensions/typescript-language-features/package-lock.json

      # Шаг 4: Копируем патч в оригинальный репозиторий
      - name: Copy patch into cloned repository
        run: |
          copy ts-compile-on-save.patch vscode-source\

      # Шаг 5: Применяем патч
      - name: Apply patch
        run: |
          cd vscode-source
          git apply ../ts-compile-on-save.patch

      - name: Apply patch
        run: |
          cd vscode-source
          git apply ts-compile-on-save.patch

      - name: Install only required dependencies
        run: |
          cd vscode-source

          npm ci --ignore-scripts --no-audit --fund=false
          npm --prefix build ci --ignore-scripts --no-audit --fund=false
          npm --prefix extensions/typescript-language-features ci --ignore-scripts --no-audit --fund=false
        env:
          VSCODE_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          npm_config_foreground_scripts: "true"

      - name: Compile only TypeScript language features extension
        run: |
          cd vscode-source\extensions\typescript-language-features
          npm run vscode:prepublish
        env:
          VSCODE_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: List artifact contents
        run: |
          echo "Compiled extension out directory:"
          dir vscode-source\extensions\typescript-language-features\out
          echo "Compiled tsServer directory:"
          dir vscode-source\extensions\typescript-language-features\out\tsServer

      - name: Upload patched runtime files
        uses: actions/upload-artifact@v4
        with:
          name: patched-bufferSyncSupport
          path: |
            vscode-source/extensions/typescript-language-features/out/tsServer/bufferSyncSupport.js
            vscode-source/extensions/typescript-language-features/out/tsServer/bufferSyncSupport.js.map

      - name: Upload full patched extension out directory
        uses: actions/upload-artifact@v4
        with:
          name: typescript-language-features-out
          path: vscode-source/extensions/typescript-language-features/out/
