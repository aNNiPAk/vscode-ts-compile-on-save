name: Apply Patch and Build on Windows

on:
  workflow_dispatch: # Запуск вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Enable long paths in Git
        run: |
          git config --global core.longpaths true
          git config --global --get core.longpaths

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone original VSCode repository
        run: |
          git -c core.longpaths=true clone --depth=1 --branch=main https://github.com/microsoft/vscode.git vscode-source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: vscode-source/.nvmrc
          cache: npm
          cache-dependency-path: |
            vscode-source/package-lock.json
            vscode-source/build/package-lock.json
            vscode-source/extensions/package-lock.json
            vscode-source/extensions/typescript-language-features/package-lock.json

      - name: Copy patch into cloned repository
        run: |
          copy ts-compile-on-save.patch vscode-source\

      - name: Apply patch
        run: |
          cd vscode-source
          git apply ts-compile-on-save.patch

      - name: Install required dependencies
        run: |
          cd vscode-source

          npm ci --ignore-scripts --no-audit --fund=false
          npm --prefix build ci --ignore-scripts --no-audit --fund=false
          npm --prefix extensions ci --no-audit --fund=false
          npm --prefix extensions/typescript-language-features ci --ignore-scripts --no-audit --fund=false
        env:
          VSCODE_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Restrict extension build to TypeScript language features
        shell: pwsh
        run: |
          $file = "vscode-source/build/lib/extensions.ts"
          $text = Get-Content $file -Raw

          $needle = ".filter(({ name }) => native ? nativeExtensionsSet.has(name) : !nativeExtensionsSet.has(name))"
          $replacement = ".filter(({ name }) => name === 'typescript-language-features')`r`n`t`t`t.filter(({ name }) => native ? nativeExtensionsSet.has(name) : !nativeExtensionsSet.has(name))"

          if ($text -notlike "*name === 'typescript-language-features'*") {
            $text = $text.Replace($needle, $replacement)
            Set-Content $file $text -NoNewline
          }

          git -C vscode-source diff -- build/lib/extensions.ts

      - name: Build TypeScript language features dist
        run: |
          cd vscode-source
          npm run compile-extensions-build
        env:
          VSCODE_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: List artifact contents
        run: |
          echo "Contents of .build/extensions:"
          dir vscode-source\.build\extensions

          echo "Contents of TypeScript language features:"
          dir vscode-source\.build\extensions\typescript-language-features

          echo "Contents of dist:"
          dir vscode-source\.build\extensions\typescript-language-features\dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-language-features-dist
          path: vscode-source/.build/extensions/typescript-language-features/dist/
